name: Bump Helium

on:
  schedule:
    - cron: "0 3 * * 1" # weekly, Monday 3am UTC
  workflow_dispatch: # manual trigger

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Check for new helium release
        id: check
        run: |
          CURRENT=$(grep 'heliumVersion' default.nix | head -1 | sed 's/.*"\([^"]*\)".*/\1/')
          LATEST=$(curl -sf https://api.github.com/repos/imputnet/helium/releases/latest | jq -r '.tag_name')

          if [ -z "$LATEST" ] || [ "$LATEST" = "null" ]; then
            echo "ERROR: Could not determine latest release version"
            exit 1
          fi

          if [ "$CURRENT" = "$LATEST" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Already on $CURRENT"
            exit 0
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"
          echo "Bumping $CURRENT -> $LATEST"

      - name: Run update script
        if: steps.check.outputs.skip != 'true'
        run: nix-shell -p nodejs --run "node update.mjs ${{ steps.check.outputs.latest }}"

      - name: Update info.json if chromium changed
        if: steps.check.outputs.skip != 'true'
        run: |
          CHROMIUM=$(grep 'chromiumVersion' default.nix | head -1 | sed 's/.*"\([^"]*\)".*/\1/')
          INFO_VERSION=$(jq -r '.chromium.version' info.json)

          if [ "$CHROMIUM" != "$INFO_VERSION" ]; then
            echo "Chromium changed: $INFO_VERSION -> $CHROMIUM"
            curl -sfL "https://raw.githubusercontent.com/NixOS/nixpkgs/master/pkgs/applications/networking/browsers/chromium/info.json" -o info.json
          fi

      - name: Verify hashes (dry run)
        if: steps.check.outputs.skip != 'true'
        run: nix build .#helium --dry-run

      - name: Create PR
        if: steps.check.outputs.skip != 'true'
        run: |
          set -e
          LATEST=${{ steps.check.outputs.latest }}
          BRANCH="automated/bump-helium-${LATEST}"
          API_URL="${{ vars.FORGEJO_API_URL || github.server_url }}"
          REPO="${{ github.repository }}"

          # Check for existing open bump PRs
          EXISTING=$(curl -sf "${API_URL}/api/v1/repos/${REPO}/pulls?state=open" \
            -H "Authorization: token ${{ secrets.FORGEJO_TOKEN }}" \
            | jq -r '.[] | select(.title | startswith("bump: helium")) | .number' | head -1)
          if [ -n "$EXISTING" ]; then
            echo "Open bump PR already exists (#${EXISTING}), skipping."
            exit 0
          fi

          git config user.name "forgejo-bot"
          git config user.email "bot@forgejo.local"
          git checkout -b "$BRANCH"
          git add default.nix info.json
          git commit -m "bump: helium ${LATEST}"
          git push origin "$BRANCH"

          RESP=$(curl -s -w "\n%{http_code}" -X POST \
            "${API_URL}/api/v1/repos/${REPO}/pulls" \
            -H "Authorization: token ${{ secrets.FORGEJO_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"head\": \"${BRANCH}\",
              \"base\": \"main\",
              \"title\": \"bump: helium ${LATEST}\",
              \"body\": \"Automated version bump to helium ${LATEST}.\\n\\nReview changes and merge if build succeeds.\"
            }")
          HTTP_CODE=$(echo "$RESP" | tail -1)
          BODY=$(echo "$RESP" | sed '$d')

          if [ "$HTTP_CODE" -ge 300 ]; then
            echo "ERROR: PR creation failed (HTTP $HTTP_CODE)"
            echo "$BODY"
            exit 1
          fi
